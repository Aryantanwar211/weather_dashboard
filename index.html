<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Weather Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .search-box button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #7dd3fc;
        }

        .weather-info {
            text-align: center;
            display: none; /* Hidden until data is loaded */
        }

        .weather-info.active {
            display: block;
        }

        .location {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .weather-desc {
            color: var(--text-muted);
            text-transform: capitalize;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .temp-display {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .detail-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
        }

        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
            <button id="search-btn">Search</button>
        </div>

        <div class="error-message" id="error-txt">City not found. Please try again.</div>

        <div class="weather-info" id="weather-dashboard">
            <div class="location" id="location-name">London, GB</div>
            <div class="weather-desc" id="description">scattered clouds</div>
            
            <div class="temp-display">
                <img src="" alt="weather icon" class="weather-icon" id="icon">
                <span id="temperature">21°C</span>
            </div>

            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feels-like">19°C</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity">64%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="wind">4.6 m/s</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure">1012 hPa</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CRITICAL: Replace 'YOUR_API_KEY_HERE' with your real OpenWeatherMap API key
        const API_KEY = '7693c50c914e585bb06efbea15383fb8'; 
        
        const searchBtn = document.getElementById('search-btn');
        const cityInput = document.getElementById('city-input');
        const weatherDashboard = document.getElementById('weather-dashboard');
        const errorTxt = document.getElementById('error-txt');

        // Event listeners
        searchBtn.addEventListener('click', fetchWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchWeather();
        });

        async function fetchWeather() {
            const city = cityInput.value.trim();
            if (!city) return;

            const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('City not found');
                
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                showError();
            }
        }

        function updateUI(data) {
            // Hide error if previously shown
            errorTxt.style.display = 'none';

            // Populate data
            document.getElementById('location-name').textContent = `${data.name}, ${data.sys.country}`;
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('feels-like').textContent = `${Math.round(data.main.feels_like)}°C`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('wind').textContent = `${data.wind.speed} m/s`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            
            // Handle Icon
            const iconCode = data.weather[0].icon;
            document.getElementById('icon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

            // Make the dashboard details visible
            weatherDashboard.classList.add('active');
        }

        function showError() {
            weatherDashboard.classList.remove('active');
            errorTxt.style.display = 'block';
        }
    </script>
</body>
</html>
